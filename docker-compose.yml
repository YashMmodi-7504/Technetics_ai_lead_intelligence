version: '3.9'
services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      SQL_HOST: db
      SQL_USER: technetics
      SQL_PASSWORD: technetics_dev
      SQL_DB_NAME: technetics
      SQL_SSL: 'false'
      ENABLE_DEV_TOKEN: 'true'
      CORS_ALLOWED_ORIGINS: 'http://localhost:3000'
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: technetics
      POSTGRES_PASSWORD: technetics_dev
      POSTGRES_DB: technetics
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U technetics']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
